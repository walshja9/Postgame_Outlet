name: Update board

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "generate_site.py"
      - "!data/snapshots.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: board-update
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    env:
      TZ: America/New_York
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests (includes the editorial gate)
        run: python -m unittest discover -s tests
      - name: Regenerate public board
        run: python generate_site.py --output docs/index.html
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "Board unchanged - nothing to commit."
          else
            git commit -m "Auto-regenerate board from data change"
            git pull --rebase origin main
            git push origin main
          fi
